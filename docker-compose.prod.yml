version: "3.9"

# GCP VM production overrides.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What this file does vs docker-compose.yml:
#   - Postgres and Redis: removes external port exposure (internal only)
#   - All app processes: restart: always + ENVIRONMENT=production
#   - Adds Caddy reverse proxy for automatic HTTPS (requires a domain in Caddyfile)
#   - MinIO is excluded (profiles: ["dev"] in base file)

services:

  # ── Infrastructure (containerized on the VM) ─────────────────────────────

  postgres:
    restart: always
    ports: []   # not exposed externally in production

  redis:
    restart: always
    ports: []   # not exposed externally in production

  # ── App processes ─────────────────────────────────────────────────────────

  api:
    restart: always
    environment:
      PROCESS_TYPE: api
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    # Port 8000 is accessed internally by Caddy — not exposed to host
    ports: []

  bot:
    restart: always
    environment:
      PROCESS_TYPE: bot
      ENVIRONMENT: production
      LOG_LEVEL: INFO

  worker:
    restart: always
    environment:
      PROCESS_TYPE: worker
      ENVIRONMENT: production
      LOG_LEVEL: INFO

  migrate:
    environment:
      PROCESS_TYPE: migrate
      ENVIRONMENT: production
    restart: "no"

  # ── Caddy — automatic HTTPS ───────────────────────────────────────────────
  # Requires: a domain pointing to this VM's IP + Caddyfile in /app/Caddyfile

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
